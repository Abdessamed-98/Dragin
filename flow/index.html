<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dragin Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      #splash { position:fixed; inset:0; background:#0f172a; display:flex; align-items:center; justify-content:center; z-index:9999; transition:opacity .3s }
      #splash.hide { opacity:0; pointer-events:none }
      @keyframes spin { to { transform:rotate(360deg) } }
      .splash-spinner { width:32px; height:32px; border:3px solid #334155; border-top-color:#818cf8; border-radius:50%; animation:spin .8s linear infinite }
    </style>
  </head>
  <body>
    <div id="splash" style="display:none"><div class="splash-spinner"></div></div>
    <script>if(location.search.includes('window=gallery'))document.getElementById('splash').style.display=''</script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
